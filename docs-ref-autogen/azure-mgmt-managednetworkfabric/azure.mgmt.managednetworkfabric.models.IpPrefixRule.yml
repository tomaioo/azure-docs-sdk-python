### YamlMime:PythonClass
uid: azure.mgmt.managednetworkfabric.models.IpPrefixRule
name: IpPrefixRule
fullName: azure.mgmt.managednetworkfabric.models.IpPrefixRule
module: azure.mgmt.managednetworkfabric.models
summary: IP Prefix Rule properties.
constructor:
  syntax: 'IpPrefixRule(*args: Any, **kwargs: Any)'
variables:
- description: 'Action to be taken on the configuration. Example: Permit | Deny. Required.
    Known

    values are: "Permit" and "Deny".'
  name: action
  types:
  - <xref:str>
  - <xref:azure.mgmt.managednetworkfabric.models.CommunityActionTypes>
- description: 'Sequence to insert to/delete from existing route. Prefix lists are

    evaluated starting with the lowest sequence number and continue down the list
    until a match is

    made. Once a match is made, the permit or deny statement is applied to that network
    and the

    rest of the list is ignored. Required.'
  name: sequence_number
  types:
  - <xref:int>
- description: 'Network Prefix specifying IPv4/IPv6 packets to be permitted or denied.

    Example: 1.1.1.0/24 | 3FFE:FFFF:0:CD30::/126. Required.'
  name: network_prefix
  types:
  - <xref:str>
- description: 'Specify prefix-list bounds. Known values are: "EqualTo",

    "GreaterThanOrEqualTo", "LesserThanOrEqualTo", and "Range".'
  name: condition
  types:
  - <xref:str>
  - <xref:azure.mgmt.managednetworkfabric.models.Condition>
- description: 'SubnetMaskLength gives the minimum NetworkPrefix length to be

    matched. Possible values for IPv4 are 1 - 32 . Possible values of IPv6 are 1 -
    128.'
  name: subnet_mask_length
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.managednetworkfabric.models.IpPrefixRule.action
  name: action
  summary: 'Permit | Deny. Required. Known values are:

    "Permit" and "Deny".'
  signature: 'action: str | _models.CommunityActionTypes'
- uid: azure.mgmt.managednetworkfabric.models.IpPrefixRule.condition
  name: condition
  summary: '"EqualTo", "GreaterThanOrEqualTo",

    "LesserThanOrEqualTo", and "Range".'
  signature: 'condition: str | _models.Condition | None'
- uid: azure.mgmt.managednetworkfabric.models.IpPrefixRule.network_prefix
  name: network_prefix
  summary: '1.1.1.0/24 |

    3FFE:FFFF:0:CD30::/126. Required.'
  signature: 'network_prefix: str'
- uid: azure.mgmt.managednetworkfabric.models.IpPrefixRule.sequence_number
  name: sequence_number
  summary: 'Sequence to insert to/delete from existing route. Prefix lists are evaluated
    starting with the

    lowest sequence number and continue down the list until a match is made. Once
    a match is made,

    the permit or deny statement is applied to that network and the rest of the list
    is ignored.

    Required.'
  signature: 'sequence_number: int'
- uid: azure.mgmt.managednetworkfabric.models.IpPrefixRule.subnet_mask_length
  name: subnet_mask_length
  summary: 'SubnetMaskLength gives the minimum NetworkPrefix length to be matched.
    Possible values for IPv4

    are 1 - 32 . Possible values of IPv6 are 1 - 128.'
  signature: 'subnet_mask_length: str | None'
