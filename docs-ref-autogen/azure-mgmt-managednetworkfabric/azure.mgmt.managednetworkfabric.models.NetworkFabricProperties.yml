  name: administrative_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.managednetworkfabric.models.AdministrativeState>
- description: NetworkFabric QoS Configuration.
  name: qos_configuration
  types:
  - <xref:azure.mgmt.managednetworkfabric.models.QosProperties>
