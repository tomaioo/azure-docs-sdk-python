- uid: azure.mgmt.managednetworkfabric.operations.NetworkFabricsOperations.begin_rotate_passwords
  name: begin_rotate_passwords
  summary: 'Rotate all passwords on the Terminal Server and Network Devices.


    Creates new passwords, then updates the Terminal Server and Network Devices to
    use the new

    passwords.


    Note that disabled devices cannot be updated and must be resynchronized with the
    new passwords

    once they are enabled.


    Fails if any of the devices could not be updated with the new password.

    Failed devices should be resynchronized with the new passwords once possible.'
