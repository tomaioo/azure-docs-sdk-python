name: ApplyMaintenanceWindowRequest
fullName: azure.mgmt.servicefabricmanagedclusters.models.ApplyMaintenanceWindowRequest
module: azure.mgmt.servicefabricmanagedclusters.models
summary: Describes the request to apply a maintenance window on a Service Fabric Managed
  Cluster.
constructor:
  syntax: 'ApplyMaintenanceWindowRequest(*args: Any, **kwargs: Any)'
variables:
- description: 'Effective start date of the maintenance window in yyyy-MM-dd HH:mm

    format. If not provided, defaults to the current time.'
  name: start_date_time
  types:
  - <xref:str>
- description: 'Duration of the maintenance window in hh:mm format. If not provided,
    defaults

    to 5 hours. Example: 08:30 for 8 and a half hours.'
  name: duration
  types:
  - <xref:str>
- description: 'Name of the timezone. List of timezones can be obtained by executing

    [System.TimeZoneInfo]::GetSystemTimeZones() in PowerShell. If not provided, defaults
    to UTC.

    Example: Pacific Standard Time, UTC, W. Europe Standard Time, Korea Standard Time,
    Central

    Australia Standard Time.'
  name: time_zone
  types:
  - <xref:str>
