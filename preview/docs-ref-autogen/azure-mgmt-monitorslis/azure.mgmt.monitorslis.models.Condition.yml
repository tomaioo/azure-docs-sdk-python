### YamlMime:PythonClass
uid: azure.mgmt.monitorslis.models.Condition
name: Condition
fullName: azure.mgmt.monitorslis.models.Condition
module: azure.mgmt.monitorslis.models
summary: Represents a filtering condition.
constructor:
  syntax: 'Condition(*args: Any, **kwargs: Any)'
variables:
- description: Dimension name used in filtering.
  name: dimension_name
  types:
  - <xref:str>
- description: 'Scalar function applied for filtering. Known values are: "max", "min",

    "avg", and "sum".'
  name: scalar_function
  types:
  - <xref:str>
  - <xref:azure.mgmt.monitorslis.models.ScalarFunction>
- description: 'Defines the sampling type. Known values are: "Average", "Sum", "Count",

    "Min", and "Max".'
  name: sampling_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.monitorslis.models.SamplingType>
- description: 'Operator used in the filtering condition. Required. Known values are:
    "eq",

    "ne", "lt", "lte", "gt", "gte", "in", "notin", "startswith", "notstartswith",
    "contains", and

    "notcontains".'
  name: operator
  types:
  - <xref:str>
  - <xref:azure.mgmt.monitorslis.models.ConditionOperator>
- description: 'Value used in filtering. For most operators (eq, ne, lt, lte, gt,
    gte, startswith,

    notstartswith, contains, notcontains) this is a single value (for example "GetContosoUsers").

    For the `in` and `notin` operators, multiple values must be joined by the delimiter
    `^^`

    (for example "east^^west^^north"). Required.'
  name: value
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.monitorslis.models.Condition.dimension_name
  name: dimension_name
  summary: Dimension name used in filtering.
  signature: 'dimension_name: str | None'
- uid: azure.mgmt.monitorslis.models.Condition.operator
  name: operator
  summary: '"eq", "ne", "lt",

    "lte", "gt", "gte", "in", "notin", "startswith", "notstartswith", "contains",

    and "notcontains".'
  signature: 'operator: str | _models.ConditionOperator'
- uid: azure.mgmt.monitorslis.models.Condition.sampling_type
  name: sampling_type
  summary: '"Average", "Sum", "Count", "Min", and

    "Max".'
  signature: 'sampling_type: str | _models.SamplingType | None'
- uid: azure.mgmt.monitorslis.models.Condition.scalar_function
  name: scalar_function
  summary: '"max", "min", "avg", and

    "sum".'
  signature: 'scalar_function: str | _models.ScalarFunction | None'
- uid: azure.mgmt.monitorslis.models.Condition.value
  name: value
  summary: 'Value used in filtering. For most operators (eq, ne, lt, lte, gt, gte,
    startswith,

    notstartswith, contains, notcontains) this is a single value (for example "GetContosoUsers").

    For the `in` and `notin` operators, multiple values must be joined by the delimiter
    `^^`

    (for example "east^^west^^north"). Required.'
  signature: 'value: str'
